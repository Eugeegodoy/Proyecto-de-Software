<html lang="es">
<head>

</head>

        <h1 class="tituloprin">La Tiendita</h1>

    <div class="form-div">

        <h2>Registro e Ingreso</h2>
        
        <form>
            <p>Usuario: <input type="text" id="usuario" class="input-form" placeholder="Indique su nombre de usuario" required></p>
            <p>Contraseña: <input type="password" id="clave" class="input-form" placeholder="Indique su contraseña" required></p>
            <p>Email: <input type="email" id="email" class="input-form" placeholder="indique su email" required></p>
            <br>
            <p><button type="button" onclick="validar()" class="btn-accion"> Ingresar </button></p>
            <p><button type="button" onclick="limpiar()" class="btn-accion"> Limpiar </button></p> 
        </form>
        
        <p class="volver"> <a href="index.html"> Volver al catálogo </a> </p>
    </div>
